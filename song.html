<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>楽曲詳細 – Project SEKAI Music Library</title>
<meta name="theme-color" content="#FAFAFA">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23FF3B63'/%3E%3Cstop offset='1' stop-color='%234B3FE4'/%3E%3C/defs%3E%3Crect width='24' height='24' rx='6' fill='url(%23g)'/%3E%3Cpath d='M9 17V6l9-1.6V15' fill='none' stroke='white' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='7' cy='17' r='2.4' fill='white'/%3E%3Ccircle cx='16' cy='15' r='2.4' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/detail.css">
<link rel="stylesheet" href="css/player.css">
</head>
<body>

<header class="app-header">
  <div class="page-container app-header-inner">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      一覧に戻る
    </a>
    <span class="header-spacer"></span>
    <div class="header-actions">
      <button type="button" class="icon-btn" id="settingsTrigger" aria-label="設定を開く">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.3"/><circle cx="12" cy="12" r="7.6" stroke-dasharray="2.1 2.5"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="page-container detail-shell has-player-padding">
  <div id="detailContent">
    <div class="empty-state" style="padding-top:var(--sp-8)">
      <div class="skel" style="width:64px;height:64px;border-radius:50%"></div>
      <p>楽曲データを読み込んでいます…</p>
    </div>
  </div>
</main>

<!-- Docked mini player -->
<div class="mini-player" id="miniPlayer">
  <div class="mini-seek"><div class="mini-seek-fill" id="miniSeekFill"></div></div>
  <div class="mini-thumb" id="miniThumb">
    <img src="" alt="" loading="lazy">
    <div class="mini-eq"><span></span><span></span><span></span></div>
  </div>
  <div class="mini-info">
    <div class="mini-title truncate" id="miniTitle"></div>
    <div class="mini-sub truncate" id="miniSub"></div>
  </div>
  <div class="mini-controls">
    <button type="button" class="mini-play" id="miniPlayBtn" aria-label="再生・一時停止">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="7 5 20 12 7 19"/></svg>
    </button>
  </div>
</div>

<div class="overlay" id="overlay"></div>

<!-- Original video confirm sheet -->
<div class="sheet" id="confirmSheet" data-sheet="confirm" role="dialog" aria-modal="true" aria-label="外部サイトへ移動">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <span class="sheet-title">外部サイトへ移動します</span>
    <button type="button" class="icon-btn" data-close-sheet aria-label="閉じる">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>
  <div class="sheet-body">
    <div class="confirm-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </div>
    <p class="confirm-text">オリジナルビデオを見るには、このアプリを離れて<strong>外部サイト</strong>へ移動します。移動してもよろしいですか？</p>
  </div>
  <div class="sheet-foot">
    <button type="button" class="btn btn-outline" data-close-sheet>キャンセル</button>
    <button type="button" class="btn btn-primary btn-block" id="confirmProceedBtn">移動する</button>
  </div>
</div>

<!-- Settings sheet -->
<div class="sheet" id="settingsSheet" data-sheet="settings" role="dialog" aria-modal="true" aria-label="設定">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <span class="sheet-title">設定</span>
    <button type="button" class="icon-btn" data-close-sheet aria-label="閉じる">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>
  <div class="sheet-body">
    <div class="option-row" style="cursor:default">
      <span class="option-label">冒頭の無音スキップ</span>
      <button type="button" class="toggle" id="skipSilenceToggle" role="switch" aria-checked="false" aria-label="冒頭の無音スキップ"></button>
    </div>
  </div>
</div>

<script type="module" src="js/detail/main.js"></script>
</body>
</html>
