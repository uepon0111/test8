<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>楽曲一覧 – Project SEKAI Music Library</title>
<meta name="description" content="プロジェクトセカイの楽曲データベース。一覧から楽曲を探して、詳細ページでボーカルごとに視聴できます。">
<meta name="theme-color" content="#FAFAFA">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23FF3B63'/%3E%3Cstop offset='1' stop-color='%234B3FE4'/%3E%3C/defs%3E%3Crect width='24' height='24' rx='6' fill='url(%23g)'/%3E%3Cpath d='M9 17V6l9-1.6V15' fill='none' stroke='white' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='7' cy='17' r='2.4' fill='white'/%3E%3Ccircle cx='16' cy='15' r='2.4' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/list.css">
</head>
<body>

<header class="app-header">
  <div class="page-container app-header-inner">
    <a href="index.html" class="wordmark">
      <span class="wm-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l11-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></svg>
      </span>
      <span class="wm-text">Sekai Music<span class="wm-sub">LIBRARY</span></span>
    </a>
    <span class="header-spacer"></span>
    <div class="header-actions">
      <button type="button" class="icon-btn" id="settingsTrigger" aria-label="設定を開く">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.3"/><circle cx="12" cy="12" r="7.6" stroke-dasharray="2.1 2.5"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="page-container">
  <div class="toolbar">
    <div class="search-wrap">
      <div class="search-field">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.2" y2="16.2"/></svg>
        <input type="text" id="searchInput" placeholder="曲名・作詞・作曲・編曲者で検索" autocomplete="off" spellcheck="false" aria-label="楽曲を検索">
        <button type="button" class="search-clear" id="searchClear" aria-label="検索をクリア">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
      </div>
      <div class="suggest-panel" id="suggestPanel"></div>
    </div>

    <div class="toolbar-row">
      <span class="result-count" id="resultCount"></span>
      <span class="toolbar-spacer"></span>
      <button type="button" class="trigger-btn" id="sortTrigger" aria-haspopup="dialog">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3v14"/><polyline points="3 13 7 17 11 13"/><path d="M17 21V7"/><polyline points="21 11 17 7 13 11"/></svg>
        <span class="trigger-label" id="sortTriggerLabel">公開日時順</span>
      </button>
      <button type="button" class="trigger-btn" id="filterTrigger" aria-haspopup="dialog" style="position:relative">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><circle cx="9" cy="7" r="2" fill="var(--surface)"/><line x1="4" y1="12" x2="20" y2="12"/><circle cx="15" cy="12" r="2" fill="var(--surface)"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="11" cy="17" r="2" fill="var(--surface)"/></svg>
        <span class="trigger-label">絞り込み</span>
        <span class="count-badge" id="filterCountBadge" style="display:none"></span>
      </button>
      <div class="view-switch" id="viewSwitch">
        <button type="button" data-view="list" aria-label="1列（タイトル表示）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
        <button type="button" data-view="grid3" class="is-active" aria-label="3列（サムネイル表示）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1.6"/><rect x="13" y="3" width="8" height="8" rx="1.6"/><rect x="3" y="13" width="8" height="8" rx="1.6"/><rect x="13" y="13" width="8" height="8" rx="1.6"/></svg>
        </button>
        <button type="button" data-view="grid5" aria-label="5列（サムネイル表示）">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="9.5" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="9.5" width="5" height="5" rx="1"/><rect x="9.5" y="9.5" width="5" height="5" rx="1"/><rect x="16" y="9.5" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/><rect x="9.5" y="16" width="5" height="5" rx="1"/><rect x="16" y="16" width="5" height="5" rx="1"/></svg>
        </button>
      </div>
    </div>

    <div class="active-filters" id="activeFilters"></div>
  </div>

  <div class="song-collection" id="songCollection" data-view="grid3"></div>
</main>

<div class="overlay" id="overlay"></div>

<!-- Sort sheet -->
<div class="sheet" id="sortSheet" data-sheet="sort" role="dialog" aria-modal="true" aria-label="並び替え">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <span class="sheet-title">並び替え</span>
    <button type="button" class="icon-btn" data-close-sheet aria-label="閉じる">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>
  <div class="sheet-body" id="sortSheetBody"></div>
  <div class="sheet-foot">
    <button type="button" class="btn btn-primary btn-block" data-close-sheet>閉じる</button>
  </div>
</div>

<!-- Filter sheet -->
<div class="sheet" id="filterSheet" data-sheet="filters" role="dialog" aria-modal="true" aria-label="絞り込み">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <span class="sheet-title">絞り込み</span>
    <button type="button" class="icon-btn" data-close-sheet aria-label="閉じる">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>
  <div class="sheet-body">
    <div class="filter-group">
      <div class="section-label">ユニット</div>
      <div class="filter-options" id="filterUnitRow"></div>
    </div>
    <div class="filter-group">
      <div class="section-label">書き下ろし</div>
      <div class="filter-options" id="filterNewlyRow"></div>
    </div>
    <div class="filter-group">
      <div class="section-label">歌唱キャラクター（すべて含む楽曲）</div>
      <div class="char-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.2" y2="16.2"/></svg>
        <input type="text" id="charSearchInput" placeholder="キャラクター名で絞り込む" autocomplete="off" spellcheck="false">
      </div>
      <div class="char-grid" id="charGrid"></div>
    </div>
  </div>
  <div class="sheet-foot">
    <button type="button" class="btn btn-outline" id="filterResetBtn">リセット</button>
    <button type="button" class="btn btn-primary btn-block" data-close-sheet>閉じる</button>
  </div>
</div>

<!-- Settings sheet -->
<div class="sheet" id="settingsSheet" data-sheet="settings" role="dialog" aria-modal="true" aria-label="設定">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <span class="sheet-title">設定</span>
    <button type="button" class="icon-btn" data-close-sheet aria-label="閉じる">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>
  <div class="sheet-body">
    <div class="option-row" style="cursor:default">
      <span class="option-label">冒頭の無音スキップ</span>
      <button type="button" class="toggle" id="skipSilenceToggle" role="switch" aria-checked="false" aria-label="冒頭の無音スキップ"></button>
    </div>
  </div>
</div>

<script type="module" src="js/list/main.js"></script>
</body>
</html>
