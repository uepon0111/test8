<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>プロセカ リザルト管理</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>

    <div id="imageModal" class="modal" onclick="if(event.target === this) closeImageModal()">
      <span class="close-btn" onclick="closeImageModal()">&times;</span>
      <img class="modal-content-img" id="modalImg">
    </div>

    <div id="batchModal" class="modal" style="background-color: rgba(0,0,0,0.5);">
      <div class="modal-form-content">
        <div class="modal-header">
          <span id="batch-modal-title"><span class="material-symbols-outlined">cloud_upload</span> 画像アップロード・編集</span>
          <span style="cursor:pointer;" onclick="closeBatchModal()">&times;</span>
        </div>
        
        <div id="upload-initial" style="display: flex; flex: 1; flex-direction: column;">
            <div class="upload-toolbar">
              <div class="profile-select-row">
                <select id="batch-profile-select"></select>
                <button id="batch-open-settings" class="btn-mode" type="button">
                  <span class="material-symbols-outlined">settings</span> 範囲設定
                </button>
              </div>
              <div id="batch-profile-badge" class="small-muted"></div>
            </div>
            <div id="drop-zone" class="drop-zone" onclick="document.getElementById('up-file').click()">
            <span class="material-symbols-outlined" style="font-size: 64px; margin-bottom: 10px;">upload_file</span>
            <div style="font-size: 1.2rem; font-weight: bold;">クリックして画像を選択</div>
            <div style="font-size: 0.9rem; margin-top: 5px;">または画像をここにドラッグ＆ドロップ</div>
            <input type="file" id="up-file" accept="image/*" multiple style="display: none;">
            </div>
        </div>

        <div id="batch-workspace" class="split-container" style="display: none;">
            <div class="sidebar">
                <div class="sidebar-toolbar">
                    <button class="btn-analyze-all" onclick="analyzeAllInBatch()">
                        <span class="material-symbols-outlined">analytics</span> 一括解析 (すべて)
                    </button>
                </div>
                <div id="batch-sidebar-list" style="overflow-y:auto; flex:1;"></div>
            </div>
            
            <div class="main-area">
                <div id="batch-editor-container" class="editor-layout" style="display: none;">
                    <div class="preview-pane">
                        <div id="batch-preview-profile-badge" class="small-muted" style="position:absolute; top:10px; left:10px; z-index:5;"></div>
                        <img id="batch-preview-img" src="" crossorigin="anonymous">
                    </div>
                    <div class="form-pane">
                        <button type="button" class="btn-reanalyze" onclick="reanalyzeCurrentItem()">
                            <span class="material-symbols-outlined" style="font-size:1rem;">analytics</span> この画像を再解析
                        </button>

                        <div class="form-group">
                            <label>曲名</label>
                            <input type="text" id="up-title" style="width: 100%; box-sizing: border-box;" oninput="updateCurrentItem('title', this.value)">
                        </div>
                        <div style="display:flex; gap:10px;">
                            <div class="form-group" style="flex:1;">
                                <label>レベル</label>
                                <input type="number" id="up-level" style="width: 100%; box-sizing: border-box;" oninput="updateCurrentItem('level', this.value)">
                            </div>
                            <div class="form-group" style="flex:1;">
                                <label>難易度</label>
                                <select id="up-diff" style="width: 100%; box-sizing: border-box;" onchange="updateCurrentItem('diff', this.value)">
                                    <option value="A">APPEND</option>
                                    <option value="M">MASTER</option>
                                    <option value="E">EXPERT</option>
                                    <option value="H">HARD</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>判定内訳</label>
                            <div class="breakdown-group">
                                <div class="breakdown-item">
                                    <label style="color:#f8f8f8;">PERFECT</label>
                                    <input type="number" id="up-perfect" min="0" value="0" oninput="updateCurrentItem('perfect', this.value)">
                                </div>
                                <div class="breakdown-item">
                                    <label style="color:#8ac5f7;">GREAT</label>
                                    <input type="number" id="up-great" min="0" value="0" oninput="updateCurrentItem('great', this.value)">
                                </div>
                                <div class="breakdown-item">
                                    <label style="color:#9bfcc0;">GOOD</label>
                                    <input type="number" id="up-good" min="0" value="0" oninput="updateCurrentItem('good', this.value)">
                                </div>
                                <div class="breakdown-item">
                                    <label style="color:#e0e0e0;">BAD</label>
                                    <input type="number" id="up-bad" min="0" value="0" oninput="updateCurrentItem('bad', this.value)">
                                </div>
                                <div class="breakdown-item">
                                    <label style="color:#d0d0d0;">MISS</label>
                                    <input type="number" id="up-miss-detail" min="0" value="0" oninput="updateCurrentItem('miss', this.value)">
                                </div>
                            </div>
                            <div class="form-group" style="margin-top:10px;">
                                <label>コンボ</label>
                                <input type="number" id="up-combo" min="0" value="" oninput="updateCurrentItem('combo', this.value)">
                            </div>
                            <div class="total-score">
                                総ミス数: <span id="up-total-miss" style="font-size:1.2rem; color:var(--diff-master);">0</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="batch-empty-msg" style="margin:auto; color:#999; text-align:center;">
                    左のリストから画像を選択してください
                </div>
            </div>
        </div>

        <div class="modal-header" style="font-size: 0.9rem; padding: 10px 20px; background: #f8f9fa; border-top: 1px solid #eee; border-bottom: none; display:block;" id="batch-msg-area">
             <span id="batch-status-msg">待機中...</span>
        </div>

        <div class="form-actions">
          <button class="btn-cancel" onclick="closeBatchModal()">閉じる</button>
          <button class="btn-submit" id="btn-exec-batch" onclick="handleBatchExecution()" disabled>実行</button>
        </div>
      </div>
    </div>


    <div id="settingsModal" class="modal settings-modal" style="display:none; background-color: rgba(0,0,0,0.55);">
      <div class="modal-form-content">
        <div class="modal-header">
          <span><span class="material-symbols-outlined">settings</span> 範囲設定</span>
          <span id="settings-close-btn" style="cursor:pointer;">&times;</span>
        </div>
        <div class="settings-layout">
          <div class="settings-panel">
            <h3>機種プロファイル</h3>
            <div class="control-group">
              <label>保存済み機種</label>
              <select id="settings-profile-select"></select>
            </div>
            <div class="control-group">
              <label>機種名</label>
              <input type="text" id="settings-profile-name" placeholder="例: iPhone 14 Pro">
            </div>
            <div class="control-group">
              <label>メモ</label>
              <input type="text" id="settings-device-hint" placeholder="端末名やメモ">
            </div>
            <div class="control-group">
              <label>画像サイズ</label>
              <div class="mini-grid" style="grid-template-columns: repeat(2, minmax(0,1fr));">
                <input type="number" id="settings-profile-width" placeholder="width">
                <input type="number" id="settings-profile-height" placeholder="height">
              </div>
            </div>
            <div class="control-group">
              <label>比率</label>
              <input type="number" id="settings-profile-ratio" step="0.00001" placeholder="ratio">
            </div>
            <div class="control-group">
              <label>サンプル画像</label>
              <input type="file" id="settings-sample-file" accept="image/*">
            </div>
            <div class="small-muted" id="settings-summary"></div>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <button type="button" class="btn-mode" id="settings-new-btn">新規作成</button>
              <button type="button" class="btn-mode" id="settings-save-btn">保存</button>
              <button type="button" class="btn-mode" id="settings-delete-btn">削除</button>
            </div>
            <div class="small-muted">枠をドラッグ、角をつかんでサイズ変更できます。</div>
            <div class="control-group">
              <label>編集対象</label>
              <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:8px;">
                <button type="button" class="btn-mode" data-region="difficulty">難易度</button>
                <button type="button" class="btn-mode" data-region="title">曲名</button>
                <button type="button" class="btn-mode" data-region="result">判定</button>
                <button type="button" class="btn-mode" data-region="combo">コンボ</button>
              </div>
            </div>
            <div class="control-group">
              <label>座標 (%)</label>
              <div class="mini-grid">
                <input type="number" id="region-x" step="0.1">
                <input type="number" id="region-y" step="0.1">
                <input type="number" id="region-w" step="0.1">
                <input type="number" id="region-h" step="0.1">
              </div>
            </div>
          </div>
          <div class="settings-panel">
            <div class="settings-preview">
              <img id="settings-preview-img" alt="">
              <div id="settings-overlay" class="settings-overlay"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="auth-section">
        <span id="auth-status">未ログイン</span>

        <button id="btn-select-mode" class="btn-mode" onclick="toggleSelectMode()">
            <span class="material-symbols-outlined">check_box</span> 選択モード
        </button>

        <div class="profile-select-row" style="min-width: 320px;">
          <select id="profile-select"></select>
          <button id="settings_button" class="btn-mode" type="button">
            <span class="material-symbols-outlined">settings</span> 設定
          </button>
        </div>
        <div id="current-profile-hint" class="small-muted"></div>

        <button id="upload_button" class="btn-auth btn-upload" onclick="openBatchModal('upload')" style="display: none;">
          <span class="material-symbols-outlined">add_photo_alternate</span> アップロード
        </button>

        <button id="authorize_button" class="btn-auth" onclick="handleAuthClick()">
          <span class="material-symbols-outlined">login</span> Googleでログイン
        </button>
        <button id="signout_button" class="btn-auth btn-signout" onclick="handleSignoutClick()" style="display: none;">
          <span class="material-symbols-outlined">logout</span> ログアウト
        </button>
      </div>

      <h2><span class="material-symbols-outlined">library_music</span> リザルト管理 (My Drive)</h2>
      
      <div class="controls">
        <div class="control-group">
          <label><span class="material-symbols-outlined">sort</span> 並べ替え</label>
          <select id="sort-order" onchange="updateView()">
            <option value="title_asc">曲名 (昇順)</option>
            <option value="title_desc">曲名 (降順)</option>
            <option value="level_desc" selected>レベル (高い順)</option>
            <option value="level_asc">レベル (低い順)</option>
            <option value="miss_asc">失点数 (少ない順)</option>
            <option value="miss_desc">失点数 (多い順)</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">filter_alt</span> FC状況</label>
          <select id="filter-fc" onchange="updateView()">
            <option value="all">すべて</option>
            <option value="fc">FC済み (FC-0)</option>
            <option value="unfc">未FC (失点あり)</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">star</span> 表示</label>
          <label class="best-only-toggle"><input type="checkbox" id="filter-best-only"> 自己ベストのみ</label>
        </div>
        
        <div class="control-group">
          <label><span class="material-symbols-outlined">remove_circle</span> 失点数 (範囲)</label>
          <div class="range-inputs">
            <input type="number" id="filter-miss-min" placeholder="0" min="0" oninput="updateView()">
            <span>~</span>
            <input type="number" id="filter-miss-max" placeholder="Max" min="0" oninput="updateView()">
          </div>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">speed</span> 難易度</label>
          <select id="filter-diff" onchange="updateView()">
            <option value="all">すべて</option>
            <option value="EASY">EASY</option>
            <option value="NORMAL">NORMAL</option>
            <option value="HARD">HARD</option>
            <option value="EXPERT">EXPERT</option>
            <option value="MASTER">MASTER</option>
            <option value="APPEND">APPEND</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">manage_search</span> 曲名検索</label>
          <input type="text" id="filter-title" placeholder="曲名を入力..." oninput="updateView()">
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">search</span> レベル検索</label>
          <input type="number" id="filter-level" placeholder="" oninput="updateView()">
        </div>
      </div>

      <div class="status-bar">
        <span id="result-count">ログインしてください</span>
      </div>

      <div id="view-progress" class="progress-wrap" style="display:block;">
        <div id="view-progress-bar" class="progress-bar"></div>
      </div>
      <div id="view-progress-label" class="progress-label"></div>

      <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">データを読み込み中...</div>
        <div class="progress-wrap" style="width:min(520px,80vw); margin-top:16px;">
          <div id="loader-progress-bar" class="progress-bar"></div>
        </div>
        <div id="loader-progress-label" class="progress-label"></div>
      </div>
      
      <div id="grid" class="grid"></div>
    </div>

    <div id="batch-actions">
        <button class="btn-batch deselect" onclick="clearSelection()"><span class="material-symbols-outlined">close</span> 選択解除</button>
        <button class="btn-batch delete" onclick="batchDelete()"><span class="material-symbols-outlined">delete</span> 削除</button>
        <button class="btn-batch edit" onclick="batchEdit()"><span class="material-symbols-outlined">edit_note</span> 編集・解析</button>
        <div style="margin-left:auto; display:flex; align-items:center; color:#666;">
            <span id="selected-count">0</span> 件選択中
        </div>
    </div>
    <div id="toast-area" class="toast-area"></div>
<script>
      window.gapiLoaded = window.gapiLoaded || function () {
        window.dispatchEvent(new Event('gapi-script-loaded'));
      };
      window.gisLoaded = window.gisLoaded || function () {
        window.dispatchEvent(new Event('gis-script-loaded'));
      };
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
