<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロセカ リザルト管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ==================================================================
     gapi / GIS 読み込みのブートストラップ (main.js より必ず先に実行される
     通常スクリプト)。async の外部スクリプトがどのタイミングで読み込み
     完了しても、type="module" 側の初期化コードが安全に反応できるように
     フラグとカスタムイベントの両方を用意しておく。
     ================================================================== -->
<script>
  window.__prskGapiReady = false;
  window.__prskGisReady = false;
  window.gapiLoaded = function () {
    window.__prskGapiReady = true;
    document.dispatchEvent(new Event('prsk:gapi-loaded'));
  };
  window.gisLoaded = function () {
    window.__prskGisReady = true;
    document.dispatchEvent(new Event('prsk:gis-loaded'));
  };
</script>

<!-- ヘッダー -->
<header class="app-header">
  <div class="app-title">
    <span class="material-symbols-outlined">equalizer</span>
    プロセカ リザルト管理
  </div>
  <div class="header-actions">
    <span id="auth-status">未ログイン</span>
    <button class="icon-btn" id="settings_button" style="display:none;" onclick="openSettingsModal()" title="設定">
      <span class="material-symbols-outlined">settings</span>
    </button>
    <button class="btn btn-secondary" id="upload_button" style="display:none;" onclick="openUploadModal()">
      <span class="material-symbols-outlined">add_photo_alternate</span> アップロード
    </button>
    <button class="btn btn-primary" id="authorize_button" onclick="handleAuthClick()">Googleでログイン</button>
    <button class="btn btn-outline" id="signout_button" style="display:none;" onclick="handleSignoutClick()">ログアウト</button>
  </div>
</header>

<!-- 絞り込み・並び替えコントロール -->
<div class="controls-bar">
  <div class="control-group">
    <span class="material-symbols-outlined" style="font-size:1.1rem;">search</span>
    <input type="text" id="filter-title" placeholder="曲名で検索" oninput="updateView()">
  </div>
  <div class="control-group">
    <select id="filter-diff" onchange="updateView()">
      <option value="all">難易度: すべて</option>
      <option value="EZ">EASY</option>
      <option value="NM">NORMAL</option>
      <option value="H">HARD</option>
      <option value="E">EXPERT</option>
      <option value="M">MASTER</option>
      <option value="A">APPEND</option>
    </select>
  </div>
  <div class="control-group">
    <input type="text" id="filter-level" placeholder="Lv." style="width:56px;" oninput="updateView()">
  </div>
  <div class="control-group">
    <select id="filter-fc" onchange="updateView()">
      <option value="all">FC: すべて</option>
      <option value="fc">FCのみ</option>
      <option value="unfc">FC以外</option>
    </select>
    <input type="number" id="filter-miss-min" placeholder="ミス最小" oninput="updateView()">
    〜
    <input type="number" id="filter-miss-max" placeholder="ミス最大" oninput="updateView()">
  </div>
  <label class="toggle-switch">
    <input type="checkbox" id="filter-best-only" onchange="toggleShowBestOnly(this.checked)">
    自己ベストのみ表示
  </label>

  <div class="spacer"></div>

  <div class="control-group">
    <select id="sort-mode" onchange="setSortMode(this.value)">
      <option value="name">名前順</option>
      <option value="level">レベル順</option>
      <option value="miss">ミス数順</option>
      <option value="date">追加日順</option>
    </select>
    <button class="sort-dir-btn" id="sort-direction-toggle" onclick="toggleSortDirection()">
      <span class="material-symbols-outlined">arrow_upward</span>
      <span class="sort-dir-label">昇順</span>
    </button>
  </div>

  <button class="icon-btn" id="select-mode-toggle" onclick="toggleSelectMode()" title="選択モード">
    <span class="material-symbols-outlined">checklist</span>
  </button>
</div>

<!-- 選択モードバー -->
<div id="select-mode-bar">
  <span id="selected-count">0 件選択中</span>
  <button class="btn-small" id="batch-edit-btn" onclick="batchEdit()" disabled>まとめて編集</button>
  <button class="btn-small btn-danger" id="batch-delete-btn" onclick="batchDelete()" disabled>まとめて削除</button>
</div>

<!-- グリッド描画中プログレスバー -->
<div id="grid-progress-bar">
  <span id="grid-progress-label">読み込み中...</span>
  <div class="grid-progress-track"><div id="grid-progress-fill"></div></div>
</div>

<!-- メインコンテンツ -->
<div class="grid-container">
  <span id="result-count">Googleアカウントでログインしてください</span>
  <div id="grid"></div>
</div>

<!-- ローディングオーバーレイ -->
<div id="loader">
  <div class="spinner"></div>
  <div id="loader-text">読み込み中...</div>
</div>

<!-- 画像プレビューモーダル -->
<div id="image-modal" class="modal-overlay" onclick="closeImageModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <img id="modal-img" src="" alt="">
  </div>
</div>

<!-- アップロード / 編集モーダル -->
<div id="batch-modal" class="modal-overlay">
  <div class="modal-box batch-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 id="batch-modal-title">アップロード</h2>
      <button onclick="closeBatchModal()">&times;</button>
    </div>
    <div class="batch-body">
      <div class="batch-sidebar">
        <div id="batch-dropzone" class="dropzone">
          <span class="material-symbols-outlined">upload_file</span>
          画像をドラッグ&ドロップ<br>またはクリックして選択
          <input type="file" id="batch-file-input" multiple accept="image/*" style="display:none;">
        </div>
        <div id="batch-sidebar-list" class="sidebar-list"></div>
        <button class="btn-small" id="btn-analyze-all" onclick="analyzeAllInBatch()">
          <span class="material-symbols-outlined" style="font-size:1rem;">auto_awesome</span> 全て解析
        </button>
      </div>
      <div class="batch-main">
        <div id="batch-empty-state" class="batch-empty">左のエリアに画像を追加してください</div>
        <div id="batch-item-form" class="batch-item-form" style="display:none;">
          <div class="batch-preview">
            <img id="form-preview-img" src="" alt="preview">
          </div>
          <div class="batch-fields">
            <div class="field-row">
              <label>機種プロファイル
                <select id="form-profile-select" onchange="handleProfileChange()"></select>
              </label>
              <button class="btn-small" id="btn-reanalyze" onclick="reanalyzeCurrentItem()" type="button">
                <span class="material-symbols-outlined" style="font-size:1rem;">refresh</span> 再解析
              </button>
            </div>
            <div class="field-row">
              <label style="flex:1;">タイトル
                <input type="text" id="form-title" oninput="updateCurrentItem()">
              </label>
            </div>
            <div class="field-row">
              <label>難易度
                <select id="form-diff" onchange="handleDiffChange()">
                  <option value="EZ">EASY</option>
                  <option value="NM">NORMAL</option>
                  <option value="H">HARD</option>
                  <option value="E">EXPERT</option>
                  <option value="M">MASTER</option>
                  <option value="A">APPEND</option>
                </select>
              </label>
              <label>レベル
                <input type="number" id="form-level" oninput="updateCurrentItem()">
              </label>
            </div>
            <div class="field-row judge-grid">
              <label>PERFECT <input type="number" id="form-perfect" oninput="updateCurrentItem()"></label>
              <label>GREAT <input type="number" id="form-great" oninput="updateCurrentItem()"></label>
              <label>GOOD <input type="number" id="form-good" oninput="updateCurrentItem()"></label>
              <label>BAD <input type="number" id="form-bad" oninput="updateCurrentItem()"></label>
              <label>MISS <input type="number" id="form-miss" oninput="updateCurrentItem()"></label>
              <label>COMBO <input type="number" id="form-combo" oninput="updateCurrentItem()"></label>
            </div>
            <div class="field-row" style="color:var(--text-muted); font-size:0.8rem;">
              総ミス数 (GOOD+BAD+MISS): <strong id="form-total-miss" style="color:var(--text);">0</strong>
            </div>
            <div class="field-row">
              <button class="btn-small btn-danger" id="btn-remove-item" onclick="removeCurrentItem()" type="button">この項目を削除</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <span id="batch-status-text"></span>
      <button class="btn btn-primary" id="btn-execute-batch" onclick="executeBatch()" disabled>アップロード実行</button>
    </div>
  </div>
</div>

<!-- 設定モーダル (機種プロファイル & 読み取り範囲) -->
<div id="settings-modal" class="modal-overlay">
  <div class="modal-box settings-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>設定 (読み取り範囲)</h2>
      <button onclick="closeSettingsModal()">&times;</button>
    </div>
    <div id="settings-modal-body"></div>
  </div>
</div>

<!-- 外部ライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

<!-- アプリ本体 (ESモジュール) -->
<script type="module" src="js/main.js"></script>

</body>
</html>
