<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>プロセカ リザルト管理</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="./styles.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  </head>
  <body>
    <div id="imageModal" class="modal" onclick="if(event.target === this) closeImageModal()">
      <span class="close-btn" onclick="closeImageModal()">&times;</span>
      <img class="modal-content-img" id="modalImg">
    </div>

    <div id="settingsModal" class="modal settings-modal" style="display:none; background-color: rgba(0,0,0,0.55);">
      <div class="modal-form-content">
        <div class="modal-header">
          <span><span class="material-symbols-outlined">settings</span> 読み取り範囲設定</span>
          <span style="cursor:pointer;" onclick="closeSettingsModal()">&times;</span>
        </div>
        <div class="settings-layout">
          <div class="settings-left">
            <div class="settings-panel">
              <div class="settings-toolbar">
                <label class="btn-mini" style="cursor:pointer;">
                  <span class="material-symbols-outlined" style="font-size:1rem;">upload_file</span>
                  サンプル画像
                  <input id="settings-sample-file" type="file" accept="image/*" style="display:none;">
                </label>
                <div id="settings-profile-hint" class="field-hint">サンプル画像を読み込むと、比率に近い機種が自動選択されます。</div>
              </div>
              <div id="settings-preview-container" class="settings-preview-wrap">
                <img id="settings-preview-img" src="" alt="">
                <div id="settings-preview-overlay" class="settings-preview-overlay"></div>
              </div>
            </div>
          </div>
          <div class="settings-right">
            <div class="settings-panel">
              <div class="profile-row">
                <div class="form-group">
                  <label>機種設定</label>
                  <select id="settings-profile-select" style="width:100%; box-sizing:border-box;"></select>
                </div>
                <div class="form-group">
                  <label>機種名</label>
                  <input type="text" id="settings-profile-name" style="width:100%; box-sizing:border-box;">
                </div>
              </div>

              <div class="profile-row" style="margin-top:10px;">
                <div class="form-group">
                  <label>保存フォルダ名</label>
                  <input type="text" id="settings-root-folder-name" style="width:100%; box-sizing:border-box;" value="PRSK_RESULTS">
                </div>
                <div class="form-group">
                  <label>編集中の領域</label>
                  <div id="settings-region-name" style="padding:10px 12px; background:#fff; border:1px solid #ddd; border-radius:8px;">曲名</div>
                </div>
              </div>

              <div class="region-tab-row" id="settings-region-list"></div>

              <div class="settings-grid">
                <div class="form-group"><label>x (%)</label><input id="region-x" type="number" step="0.01" min="0" max="100" style="width:100%; box-sizing:border-box;"></div>
                <div class="form-group"><label>y (%)</label><input id="region-y" type="number" step="0.01" min="0" max="100" style="width:100%; box-sizing:border-box;"></div>
                <div class="form-group"><label>w (%)</label><input id="region-w" type="number" step="0.01" min="1" max="100" style="width:100%; box-sizing:border-box;"></div>
                <div class="form-group"><label>h (%)</label><input id="region-h" type="number" step="0.01" min="1" max="100" style="width:100%; box-sizing:border-box;"></div>
              </div>

              <div class="settings-action-row">
                <button class="btn-mini" onclick="addProfileFromCurrent()"><span class="material-symbols-outlined" style="font-size:1rem;">add</span> 追加</button>
                <button class="btn-mini" onclick="duplicateCurrentProfile()"><span class="material-symbols-outlined" style="font-size:1rem;">content_copy</span> 複製</button>
                <button class="btn-mini" onclick="deleteCurrentProfile()"><span class="material-symbols-outlined" style="font-size:1rem;">delete</span> 削除</button>
              </div>

              <div class="form-actions" style="margin-top:16px;">
                <button class="btn-cancel" onclick="closeSettingsModal()">閉じる</button>
                <button class="btn-submit" onclick="saveSettingsFromModal()">保存</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="batchModal" class="modal" style="background-color: rgba(0,0,0,0.5);">
      <div class="modal-form-content">
        <div class="modal-header">
          <span id="batch-modal-title"><span class="material-symbols-outlined">cloud_upload</span> 画像アップロード・編集</span>
          <span style="cursor:pointer;" onclick="closeBatchModal()">&times;</span>
        </div>

        <div id="upload-initial" style="display: flex; flex: 1;">
          <div id="drop-zone" class="drop-zone" onclick="document.getElementById('up-file').click()">
            <span class="material-symbols-outlined" style="font-size: 64px; margin-bottom: 10px;">upload_file</span>
            <div style="font-size: 1.2rem; font-weight: bold;">クリックして画像を選択</div>
            <div style="font-size: 0.9rem; margin-top: 5px;">または画像をここにドラッグ＆ドロップ</div>
            <input type="file" id="up-file" accept="image/*" multiple style="display: none;">
          </div>
        </div>

        <div id="batch-workspace" class="split-container" style="display: none;">
          <div class="sidebar">
            <div class="sidebar-toolbar">
              <button class="btn-analyze-all" onclick="analyzeAllInBatch()">
                <span class="material-symbols-outlined">analytics</span> 一括解析 (すべて)
              </button>
            </div>
            <div id="batch-sidebar-list" style="overflow-y:auto; flex:1;"></div>
          </div>

          <div class="main-area">
            <div id="batch-editor-container" class="editor-layout" style="display: none;">
              <div class="preview-pane">
                <img id="batch-preview-img" src="" crossorigin="anonymous">
              </div>
              <div class="form-pane">
                <button type="button" class="btn-reanalyze" onclick="reanalyzeCurrentItem()">
                  <span class="material-symbols-outlined" style="font-size:1rem;">analytics</span> この画像を再解析
                </button>

                <div class="form-group">
                  <label>機種</label>
                  <select id="up-profile" style="width: 100%; box-sizing: border-box;" onchange="updateCurrentItem('profileId', this.value)"></select>
                </div>

                <div class="form-group">
                  <label>曲名</label>
                  <input type="text" id="up-title" style="width: 100%; box-sizing: border-box;" oninput="updateCurrentItem('title', this.value)">
                </div>

                <div style="display:flex; gap:10px;">
                  <div class="form-group" style="flex:1;">
                    <label>レベル</label>
                    <input type="number" id="up-level" style="width: 100%; box-sizing: border-box;" oninput="updateCurrentItem('level', this.value)">
                  </div>
                  <div class="form-group" style="flex:1;">
                    <label>難易度</label>
                    <select id="up-diff" style="width: 100%; box-sizing: border-box;" onchange="updateCurrentItem('diff', this.value)">
                      <option value="E">EASY</option>
                      <option value="N">NORMAL</option>
                      <option value="H">HARD</option>
                      <option value="E2">EXPERT</option>
                      <option value="M">MASTER</option>
                      <option value="A">APPEND</option>
                    </select>
                  </div>
                </div>

                <div class="form-group">
                  <label>判定・コンボ</label>
                  <div class="result-grid">
                    <div class="breakdown-item"><label>PERFECT</label><input type="number" id="up-perfect" min="0" value="0" oninput="updateCurrentItem('perfectCount', this.value)"></div>
                    <div class="breakdown-item"><label>GREAT</label><input type="number" id="up-great" min="0" value="0" oninput="updateCurrentItem('greatCount', this.value)"></div>
                    <div class="breakdown-item"><label>COMBO</label><input type="number" id="up-combo" min="0" value="0" oninput="updateCurrentItem('comboCount', this.value)"></div>
                    <div class="breakdown-item"><label>GOOD</label><input type="number" id="up-good" min="0" value="0" oninput="updateCurrentItem('goodCount', this.value)"></div>
                    <div class="breakdown-item"><label>BAD</label><input type="number" id="up-bad" min="0" value="0" oninput="updateCurrentItem('badCount', this.value)"></div>
                    <div class="breakdown-item"><label>MISS</label><input type="number" id="up-miss-detail" min="0" value="0" oninput="updateCurrentItem('missDetailCount', this.value)"></div>
                  </div>
                  <div class="total-score">
                    総ミス数: <span id="up-total-miss" style="font-size:1.2rem; color:var(--diff-master);">0</span>
                  </div>
                </div>
              </div>
            </div>
            <div id="batch-empty-msg" style="margin:auto; color:#999; text-align:center;">
              左のリストから画像を選択してください
            </div>
          </div>
        </div>

        <div class="modal-header" style="font-size: 0.9rem; padding: 10px 20px; background: #f8f9fa; border-top: 1px solid #eee; border-bottom: none; display:block;" id="batch-msg-area">
          <span id="batch-status-msg">待機中...</span>
        </div>

        <div class="form-actions">
          <button class="btn-cancel" onclick="closeBatchModal()">閉じる</button>
          <button class="btn-submit" id="btn-exec-batch" onclick="handleBatchExecution()" disabled>実行</button>
        </div>
      </div>
    </div>

    <div id="loader">
      <div class="spinner"></div>
      <div id="loader-text">データを読み込み中...</div>
      <div id="loader-progress"><div id="loader-progress-bar"></div></div>
    </div>

    <div id="toast" class="toast"></div>

    <div class="container">
      <div class="auth-section">
        <span id="auth-status">未ログイン</span>

        <button id="settings_button" class="btn-auth btn-mode" onclick="openSettingsModal()">
          <span class="material-symbols-outlined">settings</span> 設定
        </button>

        <button id="btn-select-mode" class="btn-mode" onclick="toggleSelectMode()">
          <span class="material-symbols-outlined">check_box</span> 選択モード
        </button>

        <button id="upload_button" class="btn-auth btn-upload" onclick="openBatchModal('upload')" style="display: none;">
          <span class="material-symbols-outlined">add_photo_alternate</span> アップロード
        </button>

        <button id="authorize_button" class="btn-auth" onclick="handleAuthClick()">
          <span class="material-symbols-outlined">login</span> Googleでログイン
        </button>
        <button id="signout_button" class="btn-auth btn-signout" onclick="handleSignoutClick()" style="display: none;">
          <span class="material-symbols-outlined">logout</span> ログアウト
        </button>
      </div>

      <h2><span class="material-symbols-outlined">library_music</span> リザルト管理 (My Drive)</h2>

      <div class="controls">
        <div class="control-group">
          <label><span class="material-symbols-outlined">sort</span> 並び替え</label>
          <div class="sort-row">
            <select id="sort-key">
              <option value="title">名前順</option>
              <option value="level" selected>楽曲レベル順</option>
              <option value="miss">ミス数順</option>
              <option value="date">追加日順</option>
            </select>
            <button id="sort-direction-button" class="btn-mini" type="button">降順</button>
          </div>
        </div>

        <div class="control-group control-toggle">
          <label><span class="material-symbols-outlined">star</span> 自己ベストのみ</label>
          <button id="best-only-button" class="btn-mini" type="button">OFF</button>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">filter_alt</span> FC状況</label>
          <select id="filter-fc">
            <option value="all">すべて</option>
            <option value="fc">FC済み (FC-0)</option>
            <option value="unfc">未FC (失点あり)</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">remove_circle</span> 失点数 (範囲)</label>
          <div class="range-inputs">
            <input type="number" id="filter-miss-min" placeholder="0" min="0">
            <span>~</span>
            <input type="number" id="filter-miss-max" placeholder="Max" min="0">
          </div>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">speed</span> 難易度</label>
          <select id="filter-diff">
            <option value="all">すべて</option>
            <option value="E">EASY</option>
            <option value="N">NORMAL</option>
            <option value="H">HARD</option>
            <option value="E2">EXPERT</option>
            <option value="M">MASTER</option>
            <option value="A">APPEND</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">manage_search</span> 曲名検索</label>
          <input type="text" id="filter-title" placeholder="曲名を入力...">
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">search</span> レベル検索</label>
          <input type="number" id="filter-level" placeholder="">
        </div>
      </div>

      <div class="status-bar">
        <span id="result-count">ログインしてください</span>
      </div>

      <div id="grid" class="grid"></div>
    </div>

    <div id="batch-actions">
      <button class="btn-batch deselect" onclick="clearSelection()"><span class="material-symbols-outlined">close</span> 選択解除</button>
      <button class="btn-batch delete" onclick="batchDelete()"><span class="material-symbols-outlined">delete</span> 削除</button>
      <button class="btn-batch edit" onclick="batchEdit()"><span class="material-symbols-outlined">edit_note</span> 編集・解析</button>
      <div style="margin-left:auto; display:flex; align-items:center; color:#666;">
        <span id="selected-count">0</span> 件選択中
      </div>
    </div>

    <script>
      window.gapiLoaded = function() {
        window.__gapiLoadedPending = true;
        if (window.__gapiLoadedHandler) window.__gapiLoadedHandler();
      };
      window.gisLoaded = function() {
        window.__gisLoadedPending = true;
        if (window.__gisLoadedHandler) window.__gisLoadedHandler();
      };
    </script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()" async defer></script>
    <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()" async defer></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
