<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>プロセカ リザルト管理</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/batch-modal.css">
  </head>
  <body>

    <div id="imageModal" class="modal" onclick="if(event.target === this) GalleryUI.closeImageModal()">
      <span class="close-btn" onclick="GalleryUI.closeImageModal()">&times;</span>
      <div class="modal-viewer">
        <img class="modal-content-img" id="modalImg">
        <div id="modal-stats" class="modal-stats"></div>
      </div>
    </div>

    <div id="batchModal" class="modal" style="background-color: rgba(0,0,0,0.5);">
      <div class="modal-form-content">
        <div class="modal-header">
          <span id="batch-modal-title"><span class="material-symbols-outlined">cloud_upload</span> 画像アップロード・編集</span>
          <span style="cursor:pointer;" onclick="UploadBatchUI.closeBatchModal()">&times;</span>
        </div>

        <div id="upload-initial" style="display: flex; flex: 1;">
            <div id="drop-zone" class="drop-zone" onclick="document.getElementById('up-file').click()">
            <span class="material-symbols-outlined" style="font-size: 64px; margin-bottom: 10px;">upload_file</span>
            <div style="font-size: 1.2rem; font-weight: bold;">クリックして画像を選択</div>
            <div style="font-size: 0.9rem; margin-top: 5px;">または画像をここにドラッグ＆ドロップ</div>
            <input type="file" id="up-file" accept="image/*" multiple style="display: none;">
            </div>
        </div>

        <div id="batch-workspace" class="split-container" style="display: none;">
            <div class="sidebar">
                <div class="sidebar-toolbar">
                    <button class="btn-analyze-all" onclick="UploadBatchUI.analyzeAllInBatch()">
                        <span class="material-symbols-outlined">analytics</span> 一括解析 (すべて)
                    </button>
                </div>
                <div id="batch-sidebar-list" style="overflow-y:auto; flex:1;"></div>
            </div>

            <div class="main-area">
                <div id="batch-editor-container" class="editor-layout" style="display: none;">
                    <div class="preview-pane">
                        <img id="batch-preview-img" src="" crossorigin="anonymous">
                    </div>
                    <div class="form-pane">
                        <button type="button" class="btn-reanalyze" onclick="UploadBatchUI.reanalyzeCurrentItem()">
                            <span class="material-symbols-outlined" style="font-size:1rem;">analytics</span> この画像を再解析
                        </button>

                        <div class="device-row">
                            <label><span class="material-symbols-outlined" style="font-size:1rem; vertical-align:middle;">smartphone</span> 読み取り機種</label>
                            <select id="up-device" onchange="UploadBatchUI.onDeviceChange(this.value)"></select>
                        </div>

                        <div class="form-group">
                            <label>曲名</label>
                            <input type="text" id="up-title" oninput="UploadBatchUI.updateCurrentItem('title', this.value)">
                        </div>
                        <div style="display:flex; gap:10px;">
                            <div class="form-group" style="flex:1;">
                                <label>レベル</label>
                                <input type="number" id="up-level" oninput="UploadBatchUI.updateCurrentItem('level', this.value)">
                            </div>
                            <div class="form-group" style="flex:1;">
                                <label>難易度</label>
                                <select id="up-diff" onchange="UploadBatchUI.updateCurrentItem('diff', this.value)">
                                    <option value="AP">APPEND</option>
                                    <option value="MS">MASTER</option>
                                    <option value="EX">EXPERT</option>
                                    <option value="HD">HARD</option>
                                    <option value="NM">NORMAL</option>
                                    <option value="EZ">EASY</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>判定内訳</label>
                            <div class="breakdown-group">
                                <div class="breakdown-item">
                                    <label style="color:#e0a300;">PERFECT</label>
                                    <input type="number" id="up-perfect" min="0" value="0" oninput="UploadBatchUI.updateCurrentItem('perfect', this.value)">
                                </div>
                                <div class="breakdown-item">
                                    <label style="color:#ff8a65;">GREAT</label>
                                    <input type="number" id="up-great" min="0" value="0" oninput="UploadBatchUI.updateCurrentItem('great', this.value)">
                                </div>
                                <div class="breakdown-item">
                                    <label style="color:#8ac5f7;">GOOD</label>
                                    <input type="number" id="up-good" min="0" value="0" oninput="UploadBatchUI.updateCurrentItem('good', this.value)">
                                </div>
                                <div class="breakdown-item">
                                    <label style="color:#9bfcc0;">BAD</label>
                                    <input type="number" id="up-bad" min="0" value="0" oninput="UploadBatchUI.updateCurrentItem('bad', this.value)">
                                </div>
                                <div class="breakdown-item">
                                    <label style="color:#e0e0e0;">MISS</label>
                                    <input type="number" id="up-miss-detail" min="0" value="0" oninput="UploadBatchUI.updateCurrentItem('missDetail', this.value)">
                                </div>
                            </div>
                            <div class="total-score">
                                総ミス数: <span id="up-total-miss" style="font-size:1.2rem; color:var(--diff-master);">0</span>
                            </div>
                        </div>

                        <div class="combo-group">
                            <label><span class="material-symbols-outlined" style="font-size:1rem; vertical-align:middle;">bolt</span> MAX COMBO</label>
                            <input type="number" id="up-combo" min="0" value="0" oninput="UploadBatchUI.updateCurrentItem('combo', this.value)">
                        </div>
                    </div>
                </div>
                <div id="batch-empty-msg" style="margin:auto; color:#999; text-align:center;">
                    左のリストから画像を選択してください
                </div>
            </div>
        </div>

        <div class="modal-header" style="font-size: 0.9rem; padding: 10px 20px; background: #f8f9fa; border-top: 1px solid #eee; border-bottom: none; display:block;" id="batch-msg-area">
             <span id="batch-status-msg">待機中...</span>
        </div>

        <div class="form-actions">
          <button class="btn-cancel" onclick="UploadBatchUI.closeBatchModal()">閉じる</button>
          <button class="btn-submit" id="btn-exec-batch" onclick="UploadBatchUI.handleBatchExecution()" disabled>実行</button>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="auth-section">
        <span id="auth-status">未ログイン</span>

        <a href="settings.html" class="btn-mode" title="OCR読み取り範囲の設定">
            <span class="material-symbols-outlined">tune</span> 設定
        </a>

        <button id="btn-select-mode" class="btn-mode" onclick="GalleryUI.toggleSelectMode()">
            <span class="material-symbols-outlined">check_box</span> 選択モード
        </button>

        <button id="upload_button" class="btn-auth btn-upload" onclick="UploadBatchUI.openBatchModal('upload')" style="display: none;">
          <span class="material-symbols-outlined">add_photo_alternate</span> アップロード
        </button>

        <button id="authorize_button" class="btn-auth" onclick="GoogleAuth.handleAuthClick()">
          <span class="material-symbols-outlined">login</span> Googleでログイン
        </button>
        <button id="signout_button" class="btn-auth btn-signout" onclick="GoogleAuth.handleSignoutClick()" style="display: none;">
          <span class="material-symbols-outlined">logout</span> ログアウト
        </button>
      </div>

      <h2><span class="material-symbols-outlined">library_music</span> リザルト管理 (My Drive)</h2>

      <div class="controls">
        <div class="control-group">
          <label><span class="material-symbols-outlined">sort</span> 並べ替え</label>
          <div class="sort-field-row">
            <select id="sort-field" onchange="Main.onSortFieldChange(this.value)">
              <option value="name">名前順</option>
              <option value="level" selected>楽曲レベル順</option>
              <option value="missCount">ミス数順</option>
              <option value="date">追加日順</option>
            </select>
            <button type="button" id="sort-dir-toggle" class="btn-mode btn-sort-dir" onclick="Main.toggleSortDir()" title="降順">
              <span class="material-symbols-outlined" id="sort-dir-icon">arrow_downward</span>
            </button>
          </div>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">filter_alt</span> FC状況</label>
          <select id="filter-fc" onchange="Main.updateView()">
            <option value="all">すべて</option>
            <option value="fc">FC済み (FC-0)</option>
            <option value="unfc">未FC (失点あり)</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">remove_circle</span> 失点数 (範囲)</label>
          <div class="range-inputs">
            <input type="number" id="filter-miss-min" placeholder="0" min="0" oninput="Main.updateView()">
            <span>~</span>
            <input type="number" id="filter-miss-max" placeholder="Max" min="0" oninput="Main.updateView()">
          </div>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">speed</span> 難易度</label>
          <select id="filter-diff" onchange="Main.updateView()">
            <option value="all">すべて</option>
            <option value="append">APPEND</option>
            <option value="master">MASTER</option>
            <option value="expert">EXPERT</option>
            <option value="hard">HARD</option>
            <option value="normal">NORMAL</option>
            <option value="easy">EASY</option>
          </select>
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">manage_search</span> 曲名検索</label>
          <input type="text" id="filter-title" placeholder="曲名を入力..." oninput="Main.updateView()">
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">search</span> レベル検索</label>
          <input type="number" id="filter-level" placeholder="" oninput="Main.updateView()">
        </div>

        <div class="control-group">
          <label><span class="material-symbols-outlined">emoji_events</span> 自己ベスト</label>
          <label class="switch-label" style="padding-top:2px;">
            <input type="checkbox" id="filter-best-only" onchange="Main.updateView()">
            <span class="switch-track"></span>
            <span>自己ベストのみ表示</span>
          </label>
        </div>
      </div>

      <div class="status-bar">
        <span id="result-count">ログインしてください</span>
      </div>
      <div id="load-progress-wrap" class="load-progress-wrap">
        <div class="load-progress-track"><div id="load-progress-bar" class="load-progress-bar"></div></div>
        <span id="load-progress-text" class="load-progress-text"></span>
      </div>

      <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">データを読み込み中...</div>
      </div>

      <div id="grid" class="grid"></div>
    </div>

    <div id="batch-actions">
        <button class="btn-batch deselect" onclick="GalleryUI.clearSelection()"><span class="material-symbols-outlined">close</span> 選択解除</button>
        <button class="btn-batch delete" onclick="GalleryUI.batchDelete()"><span class="material-symbols-outlined">delete</span> 削除</button>
        <button class="btn-batch edit" onclick="UploadBatchUI.batchEdit()"><span class="material-symbols-outlined">edit_note</span> 編集・解析</button>
        <div style="margin-left:auto; display:flex; align-items:center; color:#666;">
            <span id="selected-count">0</span> 件選択中
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <!-- アプリ本体（機能・役割ごとにファイル分割） -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/music-db.js"></script>
    <script src="js/device-profiles.js"></script>
    <script src="js/google-auth.js"></script>
    <script src="js/drive-storage.js"></script>
    <script src="js/ocr-engine.js"></script>
    <script src="js/best-score.js"></script>
    <script src="js/sort-filter.js"></script>
    <script src="js/gallery-ui.js"></script>
    <script src="js/upload-batch-ui.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
